name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "SellClubBot" `
            --collect-all customtkinter `
            main.py

      - name: Create version metadata
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $releaseInfo = Get-Content "release_version.example.json" -Raw | ConvertFrom-Json
          $sha = (Get-FileHash -Algorithm SHA256 "dist\SellClubBot.exe").Hash.ToLower()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/SellClubBot.exe"
          $notes = [string]$releaseInfo.notes
          $data = [ordered]@{
            version = $version
            download_url = $downloadUrl
            notes = $notes
            sha256 = $sha
            force = $false
          }
          $data | ConvertTo-Json | Out-File -FilePath "dist\version.json" -Encoding utf8
          $notes | Out-File -FilePath "dist\release_notes.txt" -Encoding utf8
          Get-Content "dist\version.json"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "dist\SellClubBot.exe" `
            "dist\version.json" `
            --repo "${{ github.repository }}" `
            --title "${{ github.ref_name }}" `
            --notes-file "dist\release_notes.txt"
